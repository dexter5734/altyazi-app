name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4

      - name: Java kur (Flutter/Gradle için ŞART)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Flutter kur
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'

      - name: Native Android projesini (temiz klasörde) oluştur
        run: |
          TMP=$(mktemp -d)
          flutter create --org com.example --project-name altyazi_app "$TMP/altyazi_tmp"
          cp -r "$TMP/altyazi_tmp/android" android
          rm -rf "$TMP"

      - name: Bağımlılıkları indir
        run: flutter pub get

      - name: APK derle
        run: flutter build apk --release

      - name: APK'yı artifact olarak yükle
        uses: actions/upload-artifact@v4
        with:
          name: altyazi-app-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error